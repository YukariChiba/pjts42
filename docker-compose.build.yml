networks:
  network-pjts:
    name: network-pjts
    enable_ipv6: true
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: docker-pjts
    ipam:
      config:
        - subnet: fd42:706a:7473::/64
          gateway: fd42:706a:7473::ffff
        # TODO: really remove ipv4 from interface
        - subnet: 169.254.0.0/24
          gateway: 169.254.0.1
